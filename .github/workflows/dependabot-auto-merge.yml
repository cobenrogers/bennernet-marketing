name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: PHP + Python Tests (Dependabot gate)
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Provide test config
        run: cp config.example.php config.php

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  merge:
    name: Auto-merge if allowed
    runs-on: ubuntu-latest
    needs: test
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEP_TYPE: ${{ steps.meta.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
        run: |
          DEPLOY_CRITICAL=false
          if echo "$DEP_NAMES" | grep -qi "FTP-Deploy-Action\|rsync-deploy\|ssh-deploy\|appleboy/ssh"; then
            DEPLOY_CRITICAL=true
          fi

          AUTO=false

          if [ "$DEPLOY_CRITICAL" = "true" ]; then
            [ "$UPDATE_TYPE" = "version-update:semver-patch" ] && AUTO=true
          elif [ "$DEP_TYPE" = "direct:development" ]; then
            AUTO=true
          elif [ "$ECOSYSTEM" = "github-actions" ]; then
            AUTO=true
          elif [ "$DEP_TYPE" = "direct:production" ] || [ "$DEP_TYPE" = "indirect" ]; then
            [ "$UPDATE_TYPE" = "version-update:semver-patch" ] || [ "$UPDATE_TYPE" = "version-update:semver-minor" ] && AUTO=true
          fi

          echo "dep_type=$DEP_TYPE update_type=$UPDATE_TYPE ecosystem=$ECOSYSTEM deploy_critical=$DEPLOY_CRITICAL auto=$AUTO"

          if [ "$AUTO" = "true" ]; then
            echo "Auto-merging PR: $PR_URL"
            gh pr merge --squash --delete-branch "$PR_URL"
          else
            echo "Propose: leaving PR open for review"
          fi
